<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ec-title {
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 800;
      font-size: 64px;
      fill: #2b2623;
      letter-spacing: -0.03em;
    }
    .ec-sub {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #5c5552;
      letter-spacing: 0.01em;
    }
    .l-solid  { stroke: #8c827a; stroke-width: 1.6; }
    .l-bridge { stroke: #e56b6f; stroke-width: 2.0; stroke-dasharray: 4 3; }
    .l-ghost  { stroke: #8c827a; stroke-width: 0.9; stroke-opacity: 0.28; stroke-dasharray: 2 3; }
  </style>

  <!--
    LAYOUT (900 × 220):
      Icon group spans local x  –24 → 234, y  12 → 110; translate(125, 45)
      ⇒ SVG icon x  101 → 359,  y  57 → 155 ; centre ≈ (230, 106)

      Text block starts at x 375:
        Title baseline  y 104   (cap-top ≈ 58, "g" descender ≈ 119)
        Sub1  baseline  y 140   (21 px clear of descender – no overlap)
        Sub2  baseline  y 160

      Composition x-span: 101 → ~795  ⇒ centre ≈ 448  (SVG centre 450) ✓
      Composition y-span:  57 → 163   ⇒ centre ≈ 110  (icon centre 106) ✓
  -->

  <!-- ── NETWORK ICON ─────────────────────────────────── -->
  <g transform="translate(125, 45)">

    <!-- Ghost arms – left edge -->
    <line x1="18" y1="55" x2="-22" y2="33"  class="l-ghost"/>
    <line x1="18" y1="55" x2="-24" y2="78"  class="l-ghost"/>
    <circle cx="-22" cy="33"  r="4" fill="#8c827a" fill-opacity="0.22"/>
    <circle cx="-24" cy="78"  r="4" fill="#8c827a" fill-opacity="0.22"/>

    <!-- Left cluster: A(42,12)  B(18,55)  C(60,50) -->
    <line x1="42" y1="12" x2="18" y2="55"  class="l-solid"/>
    <line x1="18" y1="55" x2="60" y2="50"  class="l-solid"/>
    <line x1="60" y1="50" x2="42" y2="12"  class="l-solid"/>

    <!-- Bridge connections (coral, dashed) -->
    <line x1="42"  y1="12" x2="112" y2="95" class="l-bridge"/>
    <line x1="60"  y1="50" x2="112" y2="95" class="l-bridge"/>
    <line x1="112" y1="95" x2="175" y2="20" class="l-bridge"/>
    <line x1="112" y1="95" x2="168" y2="60" class="l-bridge"/>

    <!-- Right cluster: D(175,20)  E(168,60)  F(200,55) -->
    <line x1="175" y1="20" x2="168" y2="60"  class="l-solid"/>
    <line x1="168" y1="60" x2="200" y2="55"  class="l-solid"/>
    <line x1="200" y1="55" x2="175" y2="20"  class="l-solid"/>

    <!-- Ghost arms – right edge -->
    <line x1="200" y1="55" x2="232" y2="33"  class="l-ghost"/>
    <line x1="200" y1="55" x2="234" y2="78"  class="l-ghost"/>
    <circle cx="232" cy="33"  r="4" fill="#8c827a" fill-opacity="0.22"/>
    <circle cx="234" cy="78"  r="4" fill="#8c827a" fill-opacity="0.22"/>

    <!-- Left cluster nodes -->
    <circle cx="42"  cy="12"  r="7.5" fill="#6d597a"/>
    <circle cx="18"  cy="55"  r="7.5" fill="#508484"/>
    <circle cx="60"  cy="50"  r="7.5" fill="#355070"/>

    <!-- Bridge / edge-case node -->
    <circle cx="112" cy="95"  r="15"  fill="#e56b6f" stroke="#ffffff" stroke-width="2.5"/>

    <!-- Right cluster nodes -->
    <circle cx="175" cy="20"  r="7.5" fill="#6d597a"/>
    <circle cx="168" cy="60"  r="7.5" fill="#355070"/>
    <circle cx="200" cy="55"  r="7.5" fill="#508484"/>

  </g>

  <!-- ── TEXT BLOCK ────────────────────────────────────── -->
  <!-- Title: baseline y=104, cap-top ≈ y=58, descender ≈ y=119 -->
  <text x="375" y="104" class="ec-title">Edge Cases</text>

  <!-- Subtitle: y=140 gives 21 px clear of title descender -->
  <text x="377" y="140" class="ec-sub">Highlighting surprising network science research, and</text>
  <text x="377" y="160" class="ec-sub">applications of network science in unconventional domains.</text>

</svg>
